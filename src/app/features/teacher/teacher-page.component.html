<main class="page">
  <header class="header">
    <a routerLink="/" class="back-link">Back</a>
    <h1>Teacher Workspace</h1>
  </header>

  <nav class="tab-nav" aria-label="Teacher workspace sections">
    <div class="tab-list" role="tablist" aria-orientation="horizontal">
      @for (tab of tabs; track tab.id) {
        <button
          type="button"
          class="tab-button"
          role="tab"
          [class.tab-button--active]="activeTab() === tab.id"
          [attr.id]="tab.id + '-tab'"
          [attr.aria-selected]="activeTab() === tab.id"
          [attr.aria-controls]="tab.id + '-panel'"
          (click)="setActiveTab(tab.id)">
          {{ tab.label }}
        </button>
      }
    </div>
  </nav>

  @if (activeTab() === 'create') {
    <section
      class="tab-panel"
      role="tabpanel"
      id="create-panel"
      aria-labelledby="create-tab">
      <app-teacher-test-builder
        [form]="form"
        [testTypes]="testTypes"
        [selectedTestType]="selectedTestType()"
        [questionErrors]="questionErrors()"
        [answerErrors]="answerErrors()"
        [previewQuestionCount]="previewQuestionCount()"
        [previewPassageCount]="previewPassageCount()"
        [previewAnswerCount]="previewAnswerCount()"
        [isPublishing]="isPublishing()"
        [publishedCode]="publishedCode()"
        [errors]="errors()"
        (useQuestionTemplate)="useQuestionTemplate()"
        (useAnswerTemplate)="useAnswerTemplate()"
        (publishTest)="publishTest()" />
    </section>
  }

  @if (activeTab() === 'created') {
    <section
      class="tab-panel"
      role="tabpanel"
      id="created-panel"
      aria-labelledby="created-tab">
      <app-teacher-test-library
        [isLoadingTests]="isLoadingTests()"
        [listError]="listError()"
        [createdTestItems]="createdTestItems()"
        [deletingCodes]="deletingCodes()"
        [selectedTest]="selectedTest()"
        [selectedTestPassageGroups]="selectedTestPassageGroups()"
        [pendingDeleteTest]="pendingDeleteTest()"
        (openTestDetails)="openTestDetails($event)"
        (closeSelectedTest)="closeSelectedTest()"
        (requestDeleteTest)="requestDeleteTest($event)"
        (cancelDeleteRequest)="cancelDeleteRequest()"
        (deleteTest)="deleteTest($event)" />
    </section>
  }
</main>
