<div class="app-shell">
  <header class="topbar">
    <div class="brand-wrap" aria-label="Testing Portal brand">
      <img
        class="brand-logo"
        ngSrc="https://cdn-icons-png.flaticon.com/512/8750/8750754.png"
        alt="Testing Portal logo"
        width="44"
        height="44"
        priority />
      <div class="brand-copy">
        <p class="brand">Testing Portal</p>
        <p class="tagline">Tạo và quản lý bài kiểm tra nhanh chóng và rõ ràng</p>
      </div>
    </div>

    @if (showAdminLink()) {
      <a class="meta" routerLink="/admin">Admin</a>
    }
  </header>

  <main class="content">
    <router-outlet />
  </main>

  <footer class="footer">
    <p class="footer-title">Testing Portal</p>
    <p class="footer-copy">&copy; 2026 Developed by Uyen Bui Nguyen Nhi. All rights reserved.</p>
  </footer>
</div>
